<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="1000" height="240">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500&amp;display=swap');
    </style>
    <radialGradient id="base" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#62cfe3"/>
      <stop offset="100%" stop-color="#1e8faa"/>
    </radialGradient>
    <linearGradient id="crescent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a2235"/>
      <stop offset="55%"  stop-color="#155c78"/>
      <stop offset="100%" stop-color="#1e8faa" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="inner" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#eef8fc"/>
      <stop offset="65%"  stop-color="#a8dff0"/>
      <stop offset="100%" stop-color="#5ec9e0"/>
    </radialGradient>
    <clipPath id="clip">
      <circle cx="46" cy="58" r="38"/>
    </clipPath>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="46" cy="99" rx="21" ry="3" fill="rgba(0,30,50,0.35)"/>

  <!-- Orb r=38, cx=46, cy=58 -->
  <circle cx="46" cy="58" r="38" fill="url(#base)"/>
  <rect x="8" y="20" width="38" height="76" fill="url(#crescent)" clip-path="url(#clip)"/>
  <circle cx="52" cy="52" r="22" fill="url(#inner)"/>
  <circle cx="46" cy="58" r="38" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- "Clarity" baseline y=68 -->
  <text
    x="96"
    y="68"
    font-family="'Quicksand', sans-serif"
    font-weight="500"
    font-size="62"
    fill="#ffffff"
    letter-spacing="-0.5">Clarity</text>

  <!-- "Health Benefits" baseline y=106 -->
  <text
    x="98"
    y="106"
    font-family="'Quicksand', sans-serif"
    font-weight="500"
    font-size="30"
    fill="#ffffff"
    letter-spacing="1.2">Health Benefits</text>
</svg>
